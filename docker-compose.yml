version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-postgres://torbaa_user:torbaa_password_2026@postgres:5432/torbaa_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - QR_SECRET_KEY=${QR_SECRET_KEY:-torbaa_secure_qr_secret_key_2026_dev}
      - JWT_SECRET=${JWT_SECRET:-torbaa_jwt_secure_secret_key_2026_dev_minimum_32_chars}
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: torbaa_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-torbaa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-torbaa_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-torbaa_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/001_core_schema.sql:/docker-entrypoint-initdb.d/001_core_schema.sql
      - ./database/migrations/002_ledger_integrity.sql:/docker-entrypoint-initdb.d/002_ledger_integrity.sql
      - ./database/migrations/003_partitioning_and_indexes.sql:/docker-entrypoint-initdb.d/003_partitioning_and_indexes.sql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: torbaa_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
