name: Backend Foundation

on:
  pull_request:
    paths:
      - 'app/api/**'
      - 'database/**'
      - 'lib/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/backend-foundation.yml'
  push:
    branches:
      - main
    paths:
      - 'app/api/**'
      - 'database/**'
      - 'lib/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migrations
        run: npm run validate:migrations

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
