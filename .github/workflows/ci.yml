name: TORBAA Master CI/CD Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate SQL Migrations
        run: npm run validate:migrations

      - name: TypeScript Strict Typecheck
        run: npm run typecheck

      - name: Run Master Production Test Suite
        run: npm run test

      - name: Build Production Next.js Bundle
        run: npm run build
