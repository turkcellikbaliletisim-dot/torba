<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Torba QR Oluştur</title><link rel="stylesheet" href="qr-create.css"></head><body><aside><a class="logo" href="dashboard.html">TORBA</a><nav><a href="wallet.html">Cüzdan</a><a href="qr-payment.html">QR Ödeme</a><a class="active" href="qr-create.html">QR Oluştur</a></nav></aside><main><header><h1>Ödeme QR'ı Oluştur</h1><p>Tutar ve açıklama bilgisiyle tahsilat kodu üret.</p></header><form id="qrForm" class="panel"><label>Tutar<input id="amount" type="number" min="1" step="0.01" required></label><label>Açıklama<input id="note" maxlength="100"></label><button type="submit">QR Oluştur</button></form><section id="result" class="result hidden"><div class="qr" id="qrValue"></div><p id="qrText"></p></section></main><script src="qr-create.js"></script></body></html>
