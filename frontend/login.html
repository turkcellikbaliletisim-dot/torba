<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Torba Giriş</title><link rel="stylesheet" href="login.css"></head><body><main class="login-card"><a class="brand" href="index.html">TORBA</a><h1>Hesabına giriş yap</h1><p>Telefon numaranı gir, doğrulama kodunu gönderelim.</p><form id="loginForm"><label>Telefon numarası<input id="phone" type="tel" placeholder="05xx xxx xx xx" required></label><button type="submit">Kod Gönder</button></form><form id="otpForm" hidden><label>Doğrulama kodu<input id="otp" inputmode="numeric" maxlength="6" placeholder="6 haneli kod" required></label><button type="submit">Giriş Yap</button></form><p id="message" class="message"></p></main><script src="login.js"></script></body></html>
