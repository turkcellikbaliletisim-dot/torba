version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://torbaa_user:torbaa_password_2026@pgbouncer:6432/torbaa_db
      - REDIS_URL=redis://dragonfly:6379
      - QR_SECRET_KEY=torbaa_secure_qr_secret_key_2026_prod
    depends_on:
      - pgbouncer
      - dragonfly
    restart: always

  # Go Ultra-Fastpath Microservice (Handles 1.000.000+ QR Verifications/sec)
  qr-fastpath:
    build:
      context: ./microservices/qr-fastpath
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - QR_SECRET_KEY=torbaa_secure_qr_secret_key_2026_prod
    restart: always

  # DragonflyDB: Multi-threaded Redis replacement (4.000.000 ops/sec capacity)
  dragonfly:
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    container_name: torbaa_dragonfly
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    restart: always

  # PgBouncer: High-Scale Transaction Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: torbaa_pgbouncer
    environment:
      - DB_USER=torbaa_user
      - DB_PASSWORD=torbaa_password_2026
      - DB_HOST=postgres
      - DB_NAME=torbaa_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=10000
      - DEFAULT_POOL_SIZE=100
    ports:
      - "6432:6432"
    depends_on:
      - postgres
    restart: always

  # PostgreSQL 16 Core Ledger DB
  postgres:
    image: postgres:16-alpine
    container_name: torbaa_postgres
    environment:
      POSTGRES_USER: torbaa_user
      POSTGRES_PASSWORD: torbaa_password_2026
      POSTGRES_DB: torbaa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations/001_core_schema.sql:/docker-entrypoint-initdb.d/001_core_schema.sql
      - ./database/migrations/002_ledger_integrity.sql:/docker-entrypoint-initdb.d/002_ledger_integrity.sql
      - ./database/migrations/003_partitioning_and_indexes.sql:/docker-entrypoint-initdb.d/003_partitioning_and_indexes.sql
    restart: always

volumes:
  pgdata:
